<header class="site-header" role="banner">
  <a class="site-title" rel="author" href="{{ '/' | relative_url }}">
    <img src="{{ '/assets/images/sub-studio-icon.png' | relative_url }}" class="site-icon">
  </a>
    <nav class="site-nav">
      <div class="pixel-font">
        {%- for item in site.data.navigation -%}
        <a class="page-link" href="{{ item.link | relative_url }}">{{ item.name | upcase }}</a>
        {%- endfor -%}
      </div>
    </nav>
</header>
